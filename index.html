<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gülnur & Yasin | Verlobung</title>

<meta name="description" content="Einladung zur Verlobung von Gülnur & Yasin">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">


<style>

:root{
    --gold:#d8b36a;
    --gold-light:#f5e3b3;
    --dark:#080808;
    --card:#111111;
    --text:#f7f4ee;
}


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html{
    scroll-behavior:smooth;
}


body{

    background:
    radial-gradient(circle at top,
    rgba(216,179,106,.15),
    transparent 40%),
    #080808;

    color:white;
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
}


body:before{

content:"";
position:fixed;
inset:0;

background-image:
radial-gradient(#d8b36a 1px,transparent 1px);

background-size:80px 80px;
opacity:.08;

pointer-events:none;

}



h1,h2,h3{

font-family:'Cormorant Garamond',serif;

}



.container{

max-width:480px;
margin:auto;
padding:0 25px;

}



/* HERO */


.hero{

height:100vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;

}


.small-title{

letter-spacing:5px;
font-size:.7rem;
color:#c9b27b;

text-transform:uppercase;

margin-bottom:25px;

}


.names{

font-size:4rem;
font-weight:400;
line-height:1;

background:
linear-gradient(
120deg,
#fff,
#d8b36a,
#fff
);

-webkit-background-clip:text;
color:transparent;

}



.subtitle{

margin-top:25px;

font-size:.9rem;
color:#aaa;

}



.envelope{

margin-top:70px;

width:300px;
height:190px;

position:relative;

cursor:pointer;

perspective:1000px;

}



.base{

position:absolute;
inset:0;

background:#161616;

border-radius:10px;

border:1px solid rgba(216,179,106,.4);

box-shadow:
0 40px 80px black;

}



.paper{

position:absolute;

width:260px;
height:160px;

background:#f8f1df;

left:20px;
top:15px;

color:#111;

display:flex;
align-items:center;
justify-content:center;

font-family:'Cormorant Garamond',serif;

font-size:1.8rem;

transition:1s;

z-index:2;

}



.flap{

position:absolute;

top:0;
left:0;

width:0;
height:0;

border-left:150px solid transparent;
border-right:150px solid transparent;
border-top:100px solid #242424;

transform-origin:top;

transition:1s;

z-index:4;

}



.seal{

position:absolute;

top:75px;
left:50%;

transform:translateX(-50%);

width:55px;
height:55px;

border-radius:50%;

background:
linear-gradient(135deg,#8d1f1f,#400000);

border:2px solid #d8b36a;

display:flex;
align-items:center;
justify-content:center;

font-family:'Cormorant Garamond';

font-size:1.2rem;

z-index:5;

transition:.7s;

}



.envelope.open .flap{

transform:rotateX(180deg);

}



.envelope.open .seal{

opacity:0;
transform:
translateX(-50%)
scale(.2);

}



.envelope.open .paper{

transform:translateY(-80px);

}



.scroll{

margin-top:50px;

font-size:.7rem;
letter-spacing:3px;

color:#d8b36a;

animation:float 2s infinite;

}



@keyframes float{

50%{
transform:translateY(-8px);
}

}



/* SECTIONS */


section{

padding:80px 0;

}



.card{

background:
linear-gradient(
145deg,
rgba(255,255,255,.05),
rgba(255,255,255,.01)
);

border:

1px solid rgba(216,179,106,.25);

border-radius:25px;

padding:35px 25px;

backdrop-filter:blur(15px);

box-shadow:
0 30px 70px rgba(0,0,0,.5);

}



.title{

font-size:2.3rem;

color:var(--gold);

margin-bottom:20px;

}



.text{

color:#bbb;

font-size:.95rem;

line-height:1.8;

}



.gold{

color:var(--gold);

}
