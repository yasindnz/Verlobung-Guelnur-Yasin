<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verlobung — Gülnur & Yasin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0b0e14;
            --card-bg: rgba(22, 27, 38, 0.75);
            --champagne: #e2c391;
            --champagne-light: #f4e6d0;
            --champagne-gradient: linear-gradient(135deg, #f4e6d0 0%, #e2c391 50%, #b89358 100%);
            --text-main: #f0f2f5;
            --text-sub: #94a3b8;
            --wax-red: linear-gradient(135deg, #8b1d1d 0%, #520c0c 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-align: center;
            overflow-x: hidden;
            line-height: 1.8;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(226, 195, 145, 0.08) 0%, transparent 70%),
                radial-gradient(circle at 50% 100%, rgba(226, 195, 145, 0.05) 0%, transparent 70%);
        }

        h1, h2, h3, .serif {
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 1.5px;
        }

        .container {
            max-width: 440px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* --- HERO & UMSCHLAG --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .envelope-wrapper {
            position: relative;
            width: 290px;
            height: 195px;
            cursor: pointer;
            margin-top: 20px;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #121721;
            border-radius: 12px;
            border: 1px solid rgba(226, 195, 145, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .card-inside {
            position: absolute;
            top: 8px;
            left: 12px;
            right: 12px;
            height: 175px;
            background: #181f2c;
            border: 1px solid rgba(226, 195, 145, 0.4);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2;
            padding: 20px;
        }

        .card-inside h3 {
            font-size: 1.4rem;
            color: var(--champagne);
            font-weight: 600;
        }

        .card-inside p {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .envelope-pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 145px solid #141a26;
            border-right: 145px solid #141a26;
            border-top: 95px solid transparent;
            border-bottom: 100px solid #1a2232;
            border-radius: 0 0 12px 12px;
            z-index: 3;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 145px solid transparent;
            border-right: 145px solid transparent;
            border-top: 110px solid #1c2536;
            transform-origin: top;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 4;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }

        .seal {
            position: absolute;
            top: 82px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 48px;
            background: var(--wax-red);
            border-radius: 50%;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            border: 1px solid rgba(226, 195, 145, 0.3);
            transition: all 0.5s ease;
        }

        .seal span {
            font-family: 'Cormorant Garamond', serif;
            color: var(--champagne-light);
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Open State Animation */
        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }
