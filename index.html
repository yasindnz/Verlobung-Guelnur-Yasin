<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verlobung — Gülnur & Yasin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0c0a09;
            --surface-card: rgba(22, 19, 17, 0.75);
            --border-light: rgba(229, 200, 159, 0.18);
            --border-focus: rgba(229, 200, 159, 0.4);
            --accent-gold: #e5c89f;
            --accent-gold-light: #f5e6d0;
            --gold-gradient: linear-gradient(135deg, #f5e6d0 0%, #e5c89f 50%, #b8986c 100%);
            --text-primary: #f5f5f4;
            --text-secondary: #a8a29e;
            --wax-red: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            text-align: center;
            line-height: 1.7;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(229, 200, 159, 0.07) 0%, transparent 60%),
                radial-gradient(circle at 50% 100%, rgba(229, 200, 159, 0.04) 0%, transparent 60%);
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 0 20px 80px 20px;
        }

        /* --- HERO & ELEGANT ENVELOPE --- */
        .hero-section {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            padding-top: 20px;
        }

        .hero-title {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .envelope-container {
            position: relative;
            width: 300px;
            height: 200px;
            cursor: pointer;
            margin: 20px 0;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #151210;
            border-radius: 8px;
            border: 1px solid var(--border-light);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9);
        }

        .invitation-card {
            position: absolute;
            top: 10px;
            left: 12px;
            right: 12px;
            height: 180px;
            background: #1c1815;
            border: 1px solid var(--border-focus);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .invitation-card h3 {
            font-size: 1.5rem;
            color: var(--accent-gold);
            font-weight: 400;
            margin: 4px 0;
            letter-spacing: 1px;
        }

        .invitation-card p {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .envelope-pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid #181412;
            border-right: 150px solid #181412;
            border-top: 100px solid transparent;
            border-bottom: 100px solid #1f1a17;
            border-radius: 0 0 8px 8px;
            z-index: 3;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid #231e1a;
            transform-origin: top;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 4;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        .wax-seal {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 48px;
            background: var(--wax-red);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            border: 1px solid rgba(229, 200, 159, 0.4);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.2);
            transition: all 0.5s ease;
        }

        .wax-seal span {
            font-family: 'Playfair Display', serif;
            color: var(--accent-gold-light);
            font-weight: 6
